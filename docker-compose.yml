version: '3.8'

services:

  mysql:
    image: mysql:8
    container_name: virality-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: jqir#
      MYSQL_DATABASE: virality_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: virality-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  mysql_data:
